# ══════════════════════════════════════════════
# ConfigRefine — Docker Compose (Homelab)
# Place in: /opt/docker-homelab/sites/configrefine/
# ══════════════════════════════════════════════

services:
  configrefine:
    image: configrefine:latest
    container_name: configrefine
    restart: unless-stopped
    expose:
      - "80"
    environment:
      - VIRTUAL_HOST=configrefine.okoro.me
      - CONFIGREFINE_API_KEY=${CONFIGREFINE_API_KEY:-}
    networks:
      - proxy

networks:
  proxy:
    external: true