<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ConfigRefine — Network Config Cleaner</title>
    <meta name="description" content="Clean up Cisco and network device configs. Strip boilerplate, crypto, QoS, and management noise. Pull configs from lab devices via SSH." />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Open Graph / Link Previews -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="ConfigRefine" />
    <meta property="og:description" content="Network config cleanup tool. Strip boilerplate, crypto, QoS, and management noise from Cisco device configs." />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ConfigRefine" />
    <meta name="twitter:description" content="Network config cleanup tool for networking students and engineers." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Fonts loaded once here, not inside App.jsx which rerenders -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { height: 100%; }
      /* Touch momentum scrolling for panels */
      [data-scroll] { -webkit-overflow-scrolling: touch; }
    </style>
  </head>

    <div id="root"></div>
