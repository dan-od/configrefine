name: Deploy ConfigRefine

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscaled --state=mem: 2>~/tailscaled.log &
          sleep 5
          sudo tailscale up --authkey=${{ secrets.TS_AUTHKEY }} --hostname=github-ci-configrefine

      - name: Rsync to homelab
        run: |
          rsync -avz --delete \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='.env' \
            --exclude='website-portflio' \
            -e "ssh -o StrictHostKeyChecking=accept-new" \
            ./ ${{ secrets.DEPLOY_USER }}@${{ secrets.HOMELAB_HOST }}:/opt/docker-homelab/sites/configrefine/

      - name: Build & Deploy
        run: |
          ssh -o StrictHostKeyChecking=accept-new ${{ secrets.DEPLOY_USER }}@${{ secrets.HOMELAB_HOST }} << 'DEPLOY'
            cd /opt/docker-homelab/sites/configrefine

            echo "══ Building Docker image ══"
            docker build -t configrefine:latest .

            echo "══ Restarting container ══"
            docker compose down
            docker compose up -d

            echo "══ Cleanup old images ══"
            docker image prune -f

            echo "══ Status ══"
            docker ps --filter name=configrefine --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
          DEPLOY